<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sans Mushroom Box showcases fresh mushrooms, simple recipes, and home-growing inspiration for mushroom lovers." />
    <meta name="keywords" content="mushrooms, mushroom box, home growing, recipe, small business" />
    <meta property="og:title" content="Sans Mushroom Box" />
    <meta property="og:description" content="A simple, mobile-friendly showcase for Sans Mushroom Box with photos, a recipe, and a grow tutorial." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://example.com/assets/images/mushroom-1.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Sans Mushroom Box</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <button id="lang-toggle" class="lang-toggle" type="button" aria-pressed="false" aria-label="Switch between English and Malayalam"></button>

    <header class="hero-section">
      <p id="hero-eyebrow" class="eyebrow"></p>
      <h1 id="hero-title"></h1>
      <p id="hero-description"></p>
      <a id="hero-cta" href="#recipe" class="hero-cta"></a>
    </header>

    <section id="recipe" class="recipe-section" aria-labelledby="recipe-title">
      <div class="recipe-section-header">
        <h2 id="recipe-title"></h2>
        <a id="recipe-download" href="assets/recipe.pdf" download></a>
      </div>
      <div id="recipe-content" class="recipe-content" aria-live="polite"></div>
    </section>

    <main id="main">
      <section id="gallery" aria-labelledby="gallery-title">
        <h2 id="gallery-title"></h2>
        <div class="gallery-grid" role="list">
          <figure class="gallery-card" role="listitem">
            <img src="assets/images/mushroom-1.jpg" alt="Cluster of golden oyster mushrooms on a wooden surface" loading="lazy" />
          </figure>
          <figure class="gallery-card" role="listitem">
            <img src="assets/images/mushroom-2.jpg" alt="Fresh mushrooms arranged in a small basket" loading="lazy" />
          </figure>
          <figure class="gallery-card" role="listitem">
            <img src="assets/images/mushroom-3.jpg" alt="A tray of baby mushrooms in a warm indoor grow setup" loading="lazy" />
          </figure>
        </div>
      </section>

      <section id="tutorial" aria-labelledby="tutorial-title">
        <h2 id="tutorial-title"></h2>
        <div class="video-frame">
          <video controls width="100%" style="border-radius: 8px;">
            <source src="assets/videos/packing-tutorial.mp4" type="video/mp4" />
            <span id="video-fallback-text"></span>
          </video>
        </div>
      </section>

      <section id="videos" aria-labelledby="videos-title">
        <h2 id="videos-title"></h2>
        <p id="videos-text"></p>
        <a id="videos-link" href="https://www.youtube.com/@sansmushroombox" target="_blank" rel="noopener noreferrer"></a>
      </section>

      <section id="contact" class="contact-section" aria-labelledby="contact-title">
        <h2 id="contact-title"></h2>
        <p id="contact-text"></p>
        <div class="contact-actions">
          <a id="contact-call" href="tel:8156808790"></a>
          <a id="contact-whatsapp" href="https://wa.me/918156808790" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </section>
    </main>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image preview" hidden>
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Close image preview">×</button>
      <img id="lightbox-image" src="" alt="" />
    </div>

    <footer>
      <p id="footer-text"></p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
